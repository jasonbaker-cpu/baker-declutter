name = "baker-declutter"
compatibility_date = "2026-05-20"
pages_build_output_dir = "."

# Smart Placement runs Pages Functions on the Cloudflare edge nearest
# to the busiest subrequest destination (OpenAI's API) instead of the
# edge nearest the visitor. This eliminates the "Network connection
# lost" failures the VA was seeing — her requests were landing on an
# Asian edge that had too far to reach OpenAI before the subrequest
# budget ran out.
[placement]
mode = "smart"
