<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baker.  -  AI Declutter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Syne",sans-serif;background:#080808;color:#fff;min-height:100vh;}
.header{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);background:#111;}
.logo{font-size:17px;font-weight:700;letter-spacing:-.03em;}
.logo em{color:#c94a0c;font-style:normal;}
.status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.5);}
.dot{width:7px;height:7px;border-radius:50%;background:#4caf50;}
.tag{font-size:10px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em;}
.main{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 49px);}
.left{border-right:1px solid rgba(255,255,255,0.07);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.drop{border:1.5px dashed rgba(255,255,255,0.12);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.drop:hover,.drop.over{border-color:#c94a0c;background:rgba(201,74,12,0.05);}
.drop-icon{font-size:28px;margin-bottom:8px;opacity:.4;}
.drop-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.drop-sub{font-size:11px;color:rgba(255,255,255,0.35);}
.browse-btn{display:inline-block;margin-top:10px;font-size:10px;font-family:"DM Mono",monospace;background:#c94a0c;color:#fff;padding:6px 14px;border-radius:5px;cursor:pointer;border:none;}
#file-input{display:none;}
.lbl{font-size:9px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.prompt-box{width:100%;background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;font-family:"DM Mono",monospace;font-size:11px;color:#fff;resize:none;outline:none;line-height:1.5;}
.prompt-box:focus{border-color:rgba(201,74,12,0.4);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.stat{background:#1a1a1a;border-radius:8px;padding:10px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;font-family:"DM Mono",monospace;line-height:1;}
.stat-l{font-size:9px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}
.prog-wrap{height:2px;background:#1a1a1a;border-radius:1px;overflow:hidden;}
.prog-bar{height:100%;background:#c94a0c;width:0%;transition:width .3s;border-radius:1px;}
.queue{display:flex;flex-direction:column;gap:5px;}
.qi{background:#1a1a1a;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 10px;display:flex;gap:8px;align-items:center;}
.qi-thumb{width:36px;height:28px;border-radius:3px;object-fit:cover;flex-shrink:0;}
.qi-info{flex:1;min-width:0;}
.qi-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-size{font-size:9px;color:rgba(255,255,255,0.3);font-family:"DM Mono",monospace;}
.badge{font-size:9px;font-family:"DM Mono",monospace;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.wait{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3);}
.proc{background:rgba(201,74,12,0.15);color:#e8683a;animation:blink 1.2s ease-in-out infinite;}
.done{background:rgba(42,122,58,0.12);color:#5dba6e;}
.err{background:rgba(201,64,64,0.1);color:#e07070;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.proc-btn{width:100%;padding:12px;background:#c94a0c;color:#fff;border:none;border-radius:10px;font-family:"Syne",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;}
.proc-btn:hover:not(:disabled){background:#e8683a;}
.proc-btn:disabled{opacity:.35;cursor:not-allowed;}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none;}
.proc-btn.running .spin{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.right{display:flex;flex-direction:column;}
.right-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;}
.right-title{font-size:12px;font-weight:600;}
.dl-all{font-size:10px;font-family:"DM Mono",monospace;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:5px 12px;border-radius:5px;cursor:pointer;display:none;}
.dl-all.show{display:block;}
.results-wrap{flex:1;overflow-y:auto;padding:16px;}
.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;opacity:.25;}
.rc{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;}
.rc-imgs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.04);}
.rc-imgs img{width:100%;height:140px;object-fit:cover;display:block;}
.rc-labels{display:grid;grid-template-columns:1fr 1fr;}
.rc-label{font-size:9px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.3);padding:4px 8px;text-transform:uppercase;}
.rc-body{padding:12px 14px;}
.rc-name{font-size:12px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-footer{display:flex;gap:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.07);}
.dl-btn{font-size:10px;font-family:"DM Mono",monospace;background:#c94a0c;color:#fff;border:none;border-radius:5px;padding:5px 12px;cursor:pointer;text-decoration:none;display:inline-block;}
.rc-proc{padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.proc-spin{width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:#c94a0c;border-radius:50%;animation:spin .65s linear infinite;}
.rc-msg{font-size:11px;color:rgba(255,255,255,0.5);}
.rc-err-msg{font-size:11px;color:#e07070;font-family:"DM Mono",monospace;margin-top:4px;}
.batch-section{margin-bottom:20px;}
.batch-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1a1a1a;border-radius:8px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.08);}
.batch-title{font-size:11px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.06em;}
.batch-count{font-size:11px;font-family:"DM Mono",monospace;color:#5dba6e;}
.batch-actions{display:flex;gap:6px;}
.batch-link{font-size:10px;font-family:"DM Mono",monospace;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:5px;padding:5px 12px;cursor:pointer;text-decoration:none;display:none;}
.batch-link.show{display:inline-block;}
.batch-dl{font-size:10px;font-family:"DM Mono",monospace;background:#c94a0c;color:#fff;border:none;border-radius:5px;padding:5px 12px;cursor:pointer;display:none;}
.batch-dl.show{display:inline-block;}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;border:1px solid #5dba6e;color:#fff;padding:14px 18px;border-radius:10px;font-size:13px;font-family:"Syne",sans-serif;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateY(100px);opacity:0;transition:all .3s;max-width:360px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-dot{width:8px;height:8px;border-radius:50%;background:#5dba6e;flex-shrink:0;}
.toast a{color:#5dba6e;text-decoration:underline;}
.rc-imgs.clickable{cursor:zoom-in;position:relative;}
.rc-imgs.clickable::after{content:"Click to compare";position:absolute;inset:0;background:rgba(0,0,0,0.55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:"DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .15s;pointer-events:none;}
.rc-imgs.clickable:hover::after{opacity:1;}
.item-lb{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 24px;}
.item-lb.open{display:flex;}
.item-lb-imgs{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:1500px;width:100%;flex:1;min-height:0;}
.item-lb-side{display:flex;flex-direction:column;align-items:center;min-height:0;}
.item-lb-side img{max-width:100%;flex:1;min-height:0;object-fit:contain;background:#000;border-radius:4px;}
.item-lb-label{font-size:10px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.4);margin-top:8px;text-transform:uppercase;letter-spacing:.1em;}
.item-lb-bar{margin-top:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;}
.item-lb-name{font-size:13px;color:rgba(255,255,255,0.7);font-family:"DM Mono",monospace;}
.regen-btn{background:#c94a0c;color:#fff;border:none;border-radius:6px;padding:10px 18px;font-family:"Syne",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;}
.regen-btn:hover:not(:disabled){background:#e8683a;}
.regen-btn:disabled{opacity:.6;cursor:wait;}
.regen-spin{width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none;}
.regen-btn.running .regen-spin{display:block;}
.batch-label-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:6px;padding:10px 12px;font-family:"DM Mono",monospace;font-size:12px;margin:8px 0;box-sizing:border-box;}
.batch-label-input::placeholder{color:rgba(255,255,255,0.35);}
.batch-label-input:focus{outline:none;border-color:#c94a0c;background:rgba(255,255,255,0.08);}
.touchup-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);color:#fff;border-radius:6px;padding:10px 12px;font-family:"DM Mono",monospace;font-size:12px;min-width:280px;}
.touchup-input::placeholder{color:rgba(255,255,255,0.35);}
.touchup-input:focus{outline:none;border-color:#c94a0c;background:rgba(255,255,255,0.1);}
.touchup-btn{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:10px 16px;font-family:"Syne",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;}
.touchup-btn:hover:not(:disabled){background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.3);}
.touchup-btn:disabled{opacity:.6;cursor:wait;}
.touchup-btn.running .regen-spin{display:block;}
.item-lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.item-lb-close:hover{background:#c94a0c;border-color:#c94a0c;}
.item-lb-nav{position:absolute;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;font-family:"DM Mono",monospace;backdrop-filter:blur(4px);top:50%;transform:translateY(-50%);}
.item-lb-nav:hover{background:#c94a0c;border-color:#c94a0c;}
.item-lb-nav:disabled{opacity:.25;cursor:not-allowed;}
.item-lb-nav:disabled:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);}
.item-lb-prev{left:16px;}
.item-lb-next{right:16px;}
.item-lb-counter{font-size:12px;font-family:"DM Mono",monospace;color:#c94a0c;font-weight:600;}
.item-lb-dl{font-size:11px;font-family:"DM Mono",monospace;color:rgba(255,255,255,0.6);text-decoration:underline;background:none;border:none;cursor:pointer;}
.item-lb-dl:hover{color:#fff;}
@media (max-width:700px){.item-lb-imgs{grid-template-columns:1fr;}.item-lb{padding:48px 12px 16px;}}
.recent-section{margin-top:4px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);}
.recent-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;}
.rb-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.05);border-radius:8px;text-decoration:none;color:#fff;transition:all .15s;}
.rb-item:hover{border-color:#c94a0c;background:rgba(201,74,12,0.06);}
.rb-thumb{width:40px;height:30px;border-radius:3px;object-fit:cover;flex-shrink:0;background:#000;}
.rb-info{flex:1;min-width:0;}
.rb-id{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:"DM Mono",monospace;}
.rb-meta{font-size:9px;color:rgba(255,255,255,0.4);font-family:"DM Mono",monospace;margin-top:2px;}
.recent-empty{font-size:10px;color:rgba(255,255,255,0.3);text-align:center;padding:12px 0;font-family:"DM Mono",monospace;}
</style>

<body>

<div class="header">
  <div class="logo">Baker<em>.</em></div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="tag">AI Declutter Tool</div>
    <div class="status"><div class="dot"></div>Connected</div>
  </div>
</div>
<div class="main">
  <div class="left">
    <div class="drop" id="drop" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">&#8679;</div>
      <div class="drop-title">Drop images here</div>
      <div class="drop-sub">JPG, PNG, WEBP &mdash; multiple files</div>
      <button class="browse-btn">Browse files</button>
    </div>
    <input type="file" id="file-input" multiple accept="image/*">
    <input type="text" class="batch-label-input" id="batch-label" placeholder="Property address (optional)">
    <div>
      <div class="presets">
        <button class="preset" type="button" data-preset="bit" onclick="applyPreset('bit')">Declutter a bit</button>
        <button class="preset" type="button" data-preset="all" onclick="applyPreset('all')">Entire room</button>
      </div>
      <textarea class="prompt-box" id="prompt" rows="8"></textarea>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sn-q">0</div><div class="stat-l">Queued</div></div>
      <div class="stat"><div class="stat-n" id="sn-d" style="color:#5dba6e">0</div><div class="stat-l">Done</div></div>
      <div class="stat"><div class="stat-n" id="sn-r" style="color:#c94a0c">0</div><div class="stat-l">Left</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>
    <div class="lbl">Queue</div>
    <div class="queue" id="queue"></div>
    <button class="proc-btn" id="proc-btn" disabled onclick="startProcessing()">
      <div class="spin"></div>
      <span id="proc-txt">Add images to start</span>
    </button>
    <div class="recent-section">
      <div class="lbl">Recent batches</div>
      <div class="recent-list" id="recent-list">
        <div class="recent-empty">Loading...</div>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="right-header">
      <div class="right-title">Processed results</div>
    </div>
    <div class="results-wrap">
      <div class="results" id="results">
        <div class="empty"><div style="font-size:40px">&#128692;</div><div style="font-size:12px;color:rgba(255,255,255,.4)">Processed images appear here</div></div>
      </div>
    </div>
  </div>
</div>
<script>
var PRESETS = {
  bit: `Perform professional real estate decluttering only.
STRICT RULES (DO NOT VIOLATE)
Do NOT change, move, resize, repaint, or modify any walls, ceilings, floors, windows, doors, skirting boards, cornices, mirrors, tiles, cabinetry, benchtops, fixed shelving, wardrobes, shower screens, vanities, appliances, light fittings, blinds, curtains, or any built-in or fixed furniture
Do NOT alter camera angle, perspective, lens distortion, field of view, or room proportions
Do NOT add furniture, decor, plants, art, rugs, lighting, or styling elements
Do NOT replace or redesign any materials, colours, textures, or finishes
Do NOT "improve", modernise, stage, or beautify the space
Do NOT repair, conceal, smooth over, or remove any wall cracks, damage, stains, marks, or imperfections. All existing wall conditions must remain visible exactly as they appear in the original photo.
Do NOT clean, brighten, recolour, or in any way modify the appearance of carpet, timber floors, tiles, or any floor surface.
ONLY ALLOWED ACTIONS
Remove loose clutter and personal items only, such as: small appliances, cords, cables, bins, baskets, laundry items, toiletries, bottles, cleaning products, towels, mats, decorations, toys, boxes, papers, loose objects, countertop items, and minor floor clutter
Remove freestanding temporary storage items such as: freestanding shelving units, trolleys, racks, and temporary storage furniture that is not a bed, sofa, or dining table
If an item is removable by hand in real life, it may be removed
If an item is fixed, built-in, structural, or attached, it MUST remain unchanged
PRESERVE THESE ITEMS (DO NOT REMOVE)
Do NOT remove posters, artwork, or wall hangings — leave all wall decorations exactly as they are
Do NOT remove bed linen, doonas, pillows, or mattress covers — if bedding is present, tidy it in place, do not strip the bed
Do NOT remove cushions or pillows from sofas or chairs
CAMERA & PERSPECTIVE (CRITICAL)
The camera position, angle, and viewpoint must be 100% identical to the original photo
Do NOT flip, mirror, rotate, or reposition the camera in any way
Do NOT alter the field of view, zoom level, or lens distortion
The output must be shot from the exact same corner and direction as the input image
The horizon line and vanishing point must match the original exactly
Room proportions must be identical — do not widen, narrow, or stretch the space
PRESERVE REALISM
Maintain original lighting, shadows, reflections, and natural imperfections
Keep surfaces realistic — no over-polishing, smoothing, or artificial shine
Do NOT change the white balance, colour temperature, or overall tone of the image
The colour temperature must match the original photo exactly
Result must look like the same room, photographed at the same moment, just tidier
Do NOT alter, clean, recolour, or improve the appearance of carpets, flooring, or floor coverings. All carpet stains, wear marks, discolouration, and imperfections must remain exactly as they appear in the original photo.
OUTPUT GOAL
A clean, neutral, accurate real estate-ready image with identical architecture and layout, showing the true space with clutter removed only. Do not change any walls, perspective, or room geometry. The output must overlay perfectly onto the original image.`,
  all: `Remove all freestanding, portable, and loose items from this room. This includes all furniture (chairs, tables, beds, sofas, wardrobes, shelving units, desks, drawers, TV units, side tables, ottomans, racks, trolleys), as well as all loose objects (appliances, cords, cables, bins, baskets, laundry, toiletries, bottles, cleaning products, towels, bath mats, decorations, toys, boxes, papers, rugs, and any other portable floor or surface items).
REMOVE if it can be physically carried or moved by hand in real life.
DO NOT REMOVE OR ALTER any of the following — they must remain 100% unchanged: Windows, blinds, curtains, doors, walls, ceilings, floors, skirting boards, cornices, light fittings, power outlets, light switches, tiles, built-in cabinetry, benchtops, fixed shelving, wardrobes, shower screens, vanities, fixed appliances, mirrors, or any structural or built-in element.
DO NOT alter any of the following — they must remain 100% identical to the original: Camera angle, perspective, field of view, zoom, lens distortion, room proportions, horizon line, vanishing points, lighting, shadows, colour temperature, white balance, or overall image tone.
DO NOT repair, conceal, clean, or improve any surface. All wall marks, cracks, stains, carpet wear, floor imperfections, and damage must remain exactly as visible in the original photo.
DO NOT add anything — no furniture, staging, decor, plants, art, or enhancements of any kind.
OUTPUT: The identical room, same moment, same light, same angle — with all portable and freestanding items removed, leaving only the fixed architecture and built-ins. The result must overlay perfectly onto the original image.`,
};

var PROMPT_STORAGE_KEY = 'declutter_prompt_v2';

function applyPreset(key) {
  if (!PRESETS[key]) return;
  document.getElementById('prompt').value = PRESETS[key];
  localStorage.setItem(PROMPT_STORAGE_KEY, PRESETS[key]);
  updatePresetButtons();
}

function updatePresetButtons() {
  var current = document.getElementById('prompt').value;
  var buttons = document.querySelectorAll('.preset');
  for (var i = 0; i < buttons.length; i++) {
    var key = buttons[i].getAttribute('data-preset');
    if (PRESETS[key] === current) buttons[i].classList.add('on');
    else buttons[i].classList.remove('on');
  }
}

(function initPrompt() {
  var saved = localStorage.getItem(PROMPT_STORAGE_KEY);
  document.getElementById('prompt').value = saved || PRESETS.bit;
  updatePresetButtons();
  document.getElementById('prompt').addEventListener('input', function() {
    localStorage.setItem(PROMPT_STORAGE_KEY, this.value);
    updatePresetButtons();
  });
})();

var queue = [];
var running = false;
var batches = [];

function showToast(msgHtml, persist) {
  var t = document.getElementById('toast');
  document.getElementById('toast-msg').innerHTML = msgHtml;
  t.classList.add('show');
  if (!persist) setTimeout(function() { t.classList.remove('show'); }, 6000);
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

function createBatchSection(batchId, items, label) {
  var results_el = document.getElementById('results');
  var empty = results_el.querySelector('.empty');
  if (empty) empty.parentNode.removeChild(empty);
  var section = document.createElement('div');
  section.className = 'batch-section';
  section.id = batchId;
  var n = batches.length;
  var time = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  var titleText = (label && String(label).trim()) ? String(label).trim() : ('Batch ' + n + ' — ' + time);
  section.innerHTML =
    '<div class="batch-header">' +
      '<div>' +
        '<div class="batch-title">' + escHtml(titleText) + '</div>' +
        '<div class="batch-count" id="' + batchId + '-count">Processing ' + items.length + ' image' + (items.length > 1 ? 's' : '') + '...</div>' +
      '</div>' +
      '<div class="batch-actions">' +
        '<a class="batch-link" id="' + batchId + '-link" href="/batch/' + batchId + '" target="_blank">Open gallery</a>' +
        '<button class="batch-dl" id="' + batchId + '-dlbtn" onclick="downloadBatch(\'' + batchId + '\')">Download batch</button>' +
      '</div>' +
    '</div>' +
    '<div class="results" id="' + batchId + '-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;"></div>';
  results_el.appendChild(section);
}

function downloadBatch(batchId) {
  var batch = batches.find(function(b) { return b.id === batchId; });
  if (!batch) return;
  var done = batch.items.filter(function(i) { return i.status === 'done' && i.resultUrl; });
  if (!done.length) return;
  if (typeof JSZip === 'undefined') {
    done.forEach(function(item, idx) { setTimeout(function() { downloadResult(item.id); }, idx * 300); });
    return;
  }
  var zip = new JSZip();
  Promise.all(done.map(function(item) {
    return fetch(item.resultUrl).then(function(r) { return r.blob(); }).then(function(b) {
      zip.file(item.name.replace(/\.[^.]+$/, '') + '_decluttered.png', b);
    });
  })).then(function() {
    return zip.generateAsync({ type: 'blob' });
  }).then(function(content) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = batchId + '.zip';
    a.click();
  });
}

var drop = document.getElementById('drop');
drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', function() { drop.classList.remove('over'); });
drop.addEventListener('drop', function(e) {
  e.preventDefault();
  drop.classList.remove('over');
  var files = Array.from(e.dataTransfer.files).filter(function(f) { return f.type.indexOf('image/') === 0; });
  addFiles(files);
});

document.getElementById('file-input').addEventListener('change', function(e) {
  addFiles(Array.from(e.target.files));
  e.target.value = '';
});

function addFiles(files) {
  files.forEach(function(f) {
    var reader = new FileReader();
    reader.onload = function(e) {
      queue.push({
        id: Date.now() + Math.random(),
        file: f, name: f.name, size: f.size,
        dataUrl: e.target.result,
        status: 'wait', resultUrl: null
      });
      renderQueue(); updateStats(); updateBtn();
    };
    reader.readAsDataURL(f);
  });
}

function renderQueue() {
  var el = document.getElementById('queue');
  if (!queue.length) { el.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < queue.length; i++) {
    var item = queue[i];
    var badgeClass = item.status === 'wait' ? 'wait' : item.status === 'proc' ? 'proc' : item.status === 'done' ? 'done' : 'err';
    var badgeText = item.status === 'wait' ? 'waiting' : item.status === 'proc' ? 'processing...' : item.status === 'done' ? 'done' : 'error';
    html += '<div class="qi"><img class="qi-thumb" src="' + item.dataUrl + '"><div class="qi-info"><div class="qi-name">' + item.name + '</div><div class="qi-size">' + Math.round(item.size / 1024) + 'kb</div></div><span class="badge ' + badgeClass + '">' + badgeText + '</span></div>';
  }
  el.innerHTML = html;
}

function updateStats() {
  var done = queue.filter(function(i) { return i.status === 'done'; }).length;
  var left = queue.filter(function(i) { return i.status === 'wait' || i.status === 'proc'; }).length;
  document.getElementById('sn-q').textContent = queue.length;
  document.getElementById('sn-d').textContent = done;
  document.getElementById('sn-r').textContent = left;
  document.getElementById('prog').style.width = queue.length ? (done / queue.length * 100) + '%' : '0%';
}

function updateBtn() {
  var btn = document.getElementById('proc-btn');
  var txt = document.getElementById('proc-txt');
  var waiting = queue.filter(function(i) { return i.status === 'wait'; }).length;
  if (running) {
    btn.disabled = false;
    btn.classList.add('running');
    txt.textContent = 'Processing... (' + waiting + ' left)';
  } else if (waiting > 0) {
    btn.disabled = false;
    btn.classList.remove('running');
    txt.textContent = 'Process ' + waiting + ' image' + (waiting !== 1 ? 's' : '');
  } else if (!queue.length) {
    btn.disabled = true;
    btn.classList.remove('running');
    txt.textContent = 'Add images to start';
  } else {
    btn.disabled = true;
    btn.classList.remove('running');
    txt.textContent = 'All done';
  }
}

async function startProcessing() {
  if (running) return;
  var items = queue.filter(function(i) { return i.status === 'wait'; });
  if (!items.length) return;

  running = true;
  updateBtn();

  var labelEl = document.getElementById('batch-label');
  var batchLabel = labelEl ? labelEl.value.trim() : '';

  var batchId;
  try {
    var res = await fetch('/api/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: items.map(function(i) { return { name: i.name }; }),
        label: batchLabel || null,
      })
    });
    var raw = await res.text();
    var data;
    try { data = JSON.parse(raw); }
    catch (e) {
      var snippet = raw.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 200);
      throw new Error('HTTP ' + res.status + ' (non-JSON): ' + (snippet || 'empty'));
    }
    if (!res.ok || !data.id) throw new Error(data.error || 'batch create failed');
    batchId = data.id;
  } catch (e) {
    running = false; updateBtn();
    showToast('Failed to create batch: ' + e.message);
    return;
  }

  var batch = { id: batchId, label: batchLabel || null, items: items, timestamp: new Date() };
  batches.push(batch);
  items.forEach(function(i) { i.batchId = batchId; });
  createBatchSection(batchId, items, batchLabel);
  if (labelEl) labelEl.value = '';

  for (var i = 0; i < items.length; i++) {
    await processOneItem(items[i], batchId);
  }

  // Kickoffs done — the Cloudflare Queue consumer Worker processes
  // them server-side. Poll the batch manifest for completion. Because
  // work is server-side, completion happens even if this tab closes;
  // the user just needs to refresh to pick up the new state.
  await pollBatchUntilDone(batchId);

  running = false;
  updateBtn();

  var doneCount = items.filter(function(i) { return i.status === 'done'; }).length;
  var dlBtn = document.getElementById(batchId + '-dlbtn');
  var linkBtn = document.getElementById(batchId + '-link');
  var countEl = document.getElementById(batchId + '-count');
  if (dlBtn && doneCount) dlBtn.classList.add('show');
  if (linkBtn) linkBtn.classList.add('show');
  if (countEl) countEl.textContent = doneCount + ' of ' + items.length + ' done';

  try {
    await fetch('/api/batch-complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ batchId: batchId })
    });
  } catch (e) {
    // Notification failure is non-fatal — gallery still works
  }

  var galleryUrl = window.location.origin + '/batch/' + batchId;
  showToast('Batch ' + batches.length + ' ready &mdash; ' + doneCount + ' image' + (doneCount !== 1 ? 's' : '') + ' &mdash; <a href="' + galleryUrl + '" target="_blank">open gallery</a>');

  loadRecentBatches();
}

async function processOneItem(item, batchId) {
  item.status = 'proc';
  renderQueue(); updateStats(); addProcessingCard(item);

  try {
    var blob = await resizeToCanvas(item.dataUrl);
    var form = new FormData();
    form.append('image', blob, 'image.png');
    form.append('prompt', document.getElementById('prompt').value);
    form.append('batchId', batchId);
    form.append('name', item.name);

    var res = await fetch('/api/edit-image', { method: 'POST', body: form });
    var raw = await res.text();
    var data;
    try { data = JSON.parse(raw); }
    catch (e) {
      var snippet = raw.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 200);
      throw new Error('HTTP ' + res.status + ' (non-JSON): ' + (snippet || 'empty'));
    }
    if (!res.ok) {
      var msg = data.error || ('HTTP ' + res.status);
      if (data.detail) msg += ' — ' + data.detail;
      throw new Error(msg);
    }
    if (!data.url) throw new Error('No URL returned');

    // Queues architecture: server enqueued the job and returned. The item
    // stays in 'proc' until polling sees the consumer Worker flip it to
    // 'done' or 'err'. Stash the expected URL for when the card renders.
    item.resultUrl = data.url;
    item.originalUrl = data.originalUrl;
  } catch (e) {
    item.status = 'err';
    item.errorMsg = e.message;
    updateResultCard(item);
  }

  renderQueue(); updateStats(); updateBtn();
}

async function pollBatchUntilDone(batchId) {
  var pollInterval = 3500;
  var maxAttempts = 360; // ~21 min ceiling — Queues retries can take a while
  for (var attempt = 0; attempt < maxAttempts; attempt++) {
    await new Promise(function(r) { setTimeout(r, pollInterval); });

    var manifest;
    try {
      var res = await fetch('/api/batch?id=' + encodeURIComponent(batchId));
      if (!res.ok) continue;
      manifest = await res.json();
    } catch (e) { continue; }
    if (!manifest || !manifest.items) continue;

    var anyChange = false;
    var allTerminal = true;
    for (var i = 0; i < manifest.items.length; i++) {
      var mItem = manifest.items[i];
      var cItem = queue.find(function(it) { return it.batchId === batchId && it.name === mItem.name; });
      if (!cItem) continue;
      if (mItem.status === 'done' && cItem.status !== 'done') {
        cItem.status = 'done';
        if (mItem.filename) cItem.resultUrl = '/img/' + batchId + '/' + mItem.filename;
        updateResultCard(cItem);
        anyChange = true;
      } else if (mItem.status === 'err' && cItem.status !== 'err') {
        cItem.status = 'err';
        cItem.errorMsg = mItem.error || 'Unknown error';
        updateResultCard(cItem);
        anyChange = true;
      } else if (mItem.status === 'proc' && cItem.status === 'err') {
        // Consumer retrying — flip back to processing.
        cItem.status = 'proc';
        cItem.errorMsg = null;
        addProcessingCard(cItem);
        anyChange = true;
      }
      if (mItem.status !== 'done' && mItem.status !== 'err') allTerminal = false;
    }
    if (anyChange) {
      renderQueue(); updateStats(); updateBtn();
      var doneCount = queue.filter(function(i) { return i.batchId === batchId && i.status === 'done'; }).length;
      var totalCount = queue.filter(function(i) { return i.batchId === batchId; }).length;
      var countEl = document.getElementById(batchId + '-count');
      if (countEl) countEl.textContent = doneCount + ' of ' + totalCount + ' done';
    }
    if (allTerminal) return;
  }
}

async function pollItemUntilDone(batchId, name, maxAttempts) {
  for (var i = 0; i < (maxAttempts || 360); i++) {
    await new Promise(function(r) { setTimeout(r, 3500); });
    try {
      var res = await fetch('/api/batch?id=' + encodeURIComponent(batchId));
      if (!res.ok) continue;
      var manifest = await res.json();
      var mItem = manifest.items.find(function(it) { return it.name === name; });
      if (mItem && (mItem.status === 'done' || mItem.status === 'err')) return mItem;
    } catch (e) {}
  }
  return { status: 'err', error: 'Polling timeout' };
}

function resizeToCanvas(dataUrl) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = 1920; canvas.height = 1280;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 1920, 1280);
      var scale = Math.min(1920 / img.width, 1280 / img.height);
      var w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (1920 - w) / 2, (1280 - h) / 2, w, h);
      canvas.toBlob(function(b) { b ? resolve(b) : reject(new Error('toBlob failed')); }, 'image/png');
    };
    img.onerror = function() { reject(new Error('Failed to load image')); };
    img.src = dataUrl;
  });
}

function addProcessingCard(item) {
  var gridId = item.batchId ? item.batchId + '-grid' : 'results';

function updateResultCard(item) {
  var card = document.getElementById('rc-' + item.id);

    card.innerHTML =
      '<div class="rc-imgs clickable" onclick="openItemLb(\'' + item.id + '\')"><img src="' + item.dataUrl + '"><img src="' + item.resultUrl + '"></div>' +
      '<div class="rc-labels"><div class="rc-label">Before</div><div class="rc-label">After</div></div>' +
      '<div class="rc-body"><div class="rc-name">' + item.name + '</div>' +
      '<div class="rc-footer"><a class="dl-btn" href="' + item.resultUrl + '" download="' + item.name.replace(/\.[^.]+$/, '') + '_decluttered.png">Download result</a></div></div>';
  } else {
    card.innerHTML =
      '<img src="' + item.dataUrl + '" style="width:100%;height:160px;object-fit:cover;display:block;filter:brightness(0.4)">' +

  }
}

async function retryItem(id) {
  var item = queue.find(function(q) { return String(q.id) === String(id); });
  if (!item || !item.batchId) return;
  var oldCard = document.getElementById('rc-' + item.id);
  if (oldCard) oldCard.remove();
  item.status = 'wait';
  item.errorMsg = null;
  await processOneItem(item, item.batchId);
}

function downloadResult(id) {
  var item = null;
  for (var i = 0; i < queue.length; i++) { if (String(queue[i].id) === String(id)) { item = queue[i]; break; } }
  if (!item || !item.resultUrl) return;
  var a = document.createElement('a');
  a.href = item.resultUrl;
  a.download = item.name.replace(/\.[^.]+$/, '') + '_decluttered.png';
  a.click();
}

var currentLbItemId = null;
var currentLbBatchItems = []; // items in the same batch that have a resultUrl, in card order
var currentLbIdx = 0;

function openItemLb(id) {
  var item = queue.find(function(q) { return String(q.id) === String(id); });
  if (!item || !item.resultUrl) return;
  // Build the navigable set: every done item in the same batch, in queue order.
  currentLbBatchItems = queue.filter(function(q) {
    return q.batchId === item.batchId && q.resultUrl;
  });
  currentLbIdx = currentLbBatchItems.findIndex(function(q) { return String(q.id) === String(id); });
  if (currentLbIdx < 0) currentLbIdx = 0;
  loadLbItem(currentLbIdx);
  document.getElementById('item-lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function loadLbItem(idx) {
  if (!currentLbBatchItems.length) return;
  if (idx < 0) idx = 0;
  if (idx >= currentLbBatchItems.length) idx = currentLbBatchItems.length - 1;
  currentLbIdx = idx;
  var item = currentLbBatchItems[idx];
  currentLbItemId = item.id;
  document.getElementById('item-lb-before').src = item.dataUrl;
  document.getElementById('item-lb-after').src = item.resultUrl + '?v=' + Date.now();
  document.getElementById('item-lb-name').textContent = item.name;
  document.getElementById('item-lb-counter').textContent =
    (idx + 1) + ' / ' + currentLbBatchItems.length;
  document.getElementById('item-lb-prev').disabled = (idx === 0);
  document.getElementById('item-lb-next').disabled = (idx === currentLbBatchItems.length - 1);
  // Reset action button states whenever we switch images.
  var btn = document.getElementById('regen-btn');
  btn.disabled = false; btn.classList.remove('running');
  document.getElementById('regen-text').textContent = 'Regenerate this image';
  var tBtn = document.getElementById('touchup-btn');
  tBtn.disabled = false; tBtn.classList.remove('running');
  document.getElementById('touchup-text').textContent = 'Touch up';
  document.getElementById('touchup-input').value = '';
  // Preload neighbours.
  if (currentLbBatchItems.length > 1) {
    var nxt = currentLbBatchItems[(idx + 1) % currentLbBatchItems.length];
    var prv = currentLbBatchItems[(idx - 1 + currentLbBatchItems.length) % currentLbBatchItems.length];
    if (nxt && nxt.resultUrl) new Image().src = nxt.resultUrl;
    if (prv && prv.resultUrl) new Image().src = prv.resultUrl;
  }
}

function prevLbItem() {
  if (currentLbIdx > 0) loadLbItem(currentLbIdx - 1);
}

function nextLbItem() {
  if (currentLbIdx < currentLbBatchItems.length - 1) loadLbItem(currentLbIdx + 1);
}

function closeItemLb() {
  document.getElementById('item-lb').classList.remove('open');
  document.body.style.overflow = '';
  currentLbItemId = null;
  currentLbBatchItems = [];
  currentLbIdx = 0;
}

async function regenerateCurrent() {
  if (currentLbItemId == null) return;
  var item = queue.find(function(q) { return String(q.id) === String(currentLbItemId); });
  if (!item || !item.batchId) return;

  var btn = document.getElementById('regen-btn');
  var btnTxt = document.getElementById('regen-text');
  btn.disabled = true; btn.classList.add('running');
  btnTxt.textContent = 'Regenerating... (1-2 min)';

  try {
    var blob = await resizeToCanvas(item.dataUrl);
    var form = new FormData();
    form.append('image', blob, 'image.png');
    form.append('prompt', document.getElementById('prompt').value);
    form.append('batchId', item.batchId);
    form.append('name', item.name);

    var res = await fetch('/api/edit-image', { method: 'POST', body: form });
    var raw = await res.text();
    var data;
    try { data = JSON.parse(raw); }
    catch (e) {
      var snippet = raw.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 200);
      throw new Error('HTTP ' + res.status + ' (non-JSON): ' + (snippet || 'empty'));
    }
    if (!res.ok) {
      var msg = data.error || ('HTTP ' + res.status);
      if (data.detail) msg += ' — ' + data.detail;
      throw new Error(msg);
    }
    if (!data.url) throw new Error('No URL returned');

    // Queue consumer runs the OpenAI call; wait for it to land.
    var finalItem = await pollItemUntilDone(item.batchId, item.name, 360);
    if (finalItem.status === 'err') throw new Error(finalItem.error || 'Regenerate failed');

    item.resultUrl = data.url;
    var busted = data.url + '?v=' + Date.now();
    document.getElementById('item-lb-after').src = busted;
    updateResultCard(item);

    btn.disabled = false; btn.classList.remove('running');
    btnTxt.textContent = 'Regenerate again';
  } catch (e) {
    btn.disabled = false; btn.classList.remove('running');
    btnTxt.textContent = 'Retry regenerate';
    showToast('Regenerate failed: ' + e.message);
  }
}

async function touchupCurrent() {
  if (currentLbItemId == null) return;
  var item = queue.find(function(q) { return String(q.id) === String(currentLbItemId); });
  if (!item || !item.batchId) return;
  var input = document.getElementById('touchup-input');

  btnTxt.textContent = 'Touching up... (1-2 min)';

  try {
    var res = await fetch('/api/touch-up', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },

    });
    var raw = await res.text();
    var data;
    try { data = JSON.parse(raw); }
    catch (e) {
      var snippet = raw.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 200);
      throw new Error('HTTP ' + res.status + ' (non-JSON): ' + (snippet || 'empty'));
    }
    if (!res.ok) {
      var msg = data.error || ('HTTP ' + res.status);
      if (data.detail) msg += ' — ' + data.detail;
      throw new Error(msg);
    }
    if (!data.url) throw new Error('No URL returned');

    var finalItem = await pollItemUntilDone(item.batchId, item.name, 360);
    if (finalItem.status === 'err') throw new Error(finalItem.error || 'Touch-up failed');

    item.resultUrl = data.url;
    var busted = data.url + '?v=' + Date.now();

    btnTxt.textContent = 'Touch up';

  } catch (e) {
    btn.disabled = false; btn.classList.remove('running');
    btnTxt.textContent = 'Try again';
    showToast('Touch up failed: ' + e.message);
  }
}

function downloadCurrentLb() {
  if (currentLbItemId == null) return;
  var item = queue.find(function(q) { return String(q.id) === String(currentLbItemId); });
  if (!item || !item.resultUrl) return;
  var a = document.createElement('a');
  a.href = item.resultUrl;
  a.download = item.name.replace(/\.[^.]+$/, '') + '_decluttered.png';
  a.click();
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('item-lb').classList.contains('open')) return;
  // Don't hijack arrows while the user is typing in the touch-up input.
  var active = document.activeElement;
  var typing = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
  if (e.key === 'Escape') closeItemLb();
  else if (!typing && e.key === 'ArrowLeft') prevLbItem();
  else if (!typing && e.key === 'ArrowRight') nextLbItem();
});

var itemLbTouchStartX = 0;
(function() {
  var lb = document.getElementById('item-lb');
  if (!lb) return;
  lb.addEventListener('touchstart', function(e) {
    itemLbTouchStartX = e.changedTouches[0].screenX;
  });
  lb.addEventListener('touchend', function(e) {
    var diff = e.changedTouches[0].screenX - itemLbTouchStartX;
    if (Math.abs(diff) > 50) { if (diff < 0) nextLbItem(); else prevLbItem(); }
  });
})();

async function loadRecentBatches() {
  try {
    var res = await fetch('/api/batches');
    var data = await res.json();
    renderRecentBatches(data.batches || []);
  } catch (e) {
    document.getElementById('recent-list').innerHTML = '<div class="recent-empty">Failed to load</div>';
  }
}

function renderRecentBatches(items) {
  var el = document.getElementById('recent-list');
  if (!items.length) {
    el.innerHTML = '<div class="recent-empty">No batches yet</div>';
    return;
  }
  el.innerHTML = items.slice(0, 20).map(function(b) {
    var when = b.createdAt ? formatRelTime(b.createdAt) : '';
    var thumb = b.thumbnail
      ? '<img class="rb-thumb" src="' + b.thumbnail + '" alt="" loading="lazy">'
      : '<div class="rb-thumb"></div>';
    var primary = b.label ? escHtml(b.label) : escHtml(b.id);
    return '<a class="rb-item" href="/batch/' + b.id + '" target="_blank">' +
      thumb +
      '<div class="rb-info">' +
        '<div class="rb-id">' + primary + '</div>' +
        '<div class="rb-meta">' + when + ' &middot; ' + b.done + '/' + b.total + '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

function formatRelTime(iso) {
  var d = new Date(iso);
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd ago';
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}

loadRecentBatches();
</script>
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg">Batch ready!</span></div>

<div class="item-lb" id="item-lb" onclick="if(event.target.id==='item-lb')closeItemLb()">
  <button class="item-lb-close" onclick="closeItemLb()" aria-label="Close">&times;</button>
  <button class="item-lb-nav item-lb-prev" id="item-lb-prev" onclick="prevLbItem()" aria-label="Previous">&#8249;</button>
  <button class="item-lb-nav item-lb-next" id="item-lb-next" onclick="nextLbItem()" aria-label="Next">&#8250;</button>
  <div class="item-lb-imgs">
    <div class="item-lb-side">
      <img id="item-lb-before" alt="Before">
      <div class="item-lb-label">Before (original)</div>
    </div>
    <div class="item-lb-side">
      <img id="item-lb-after" alt="After">
      <div class="item-lb-label">After (AI processed)</div>
    </div>
  </div>
  <div class="item-lb-bar">
    <span class="item-lb-counter" id="item-lb-counter"></span>
    <span class="item-lb-name" id="item-lb-name"></span>
    <input type="text" class="touchup-input" id="touchup-input" placeholder="What's still wrong? e.g. remove the box in the corner" onkeydown="if(event.key==='Enter')touchupCurrent()">
    <button class="touchup-btn" id="touchup-btn" onclick="touchupCurrent()"><div class="regen-spin"></div><span id="touchup-text">Touch up</span></button>
    <button class="regen-btn" id="regen-btn" onclick="regenerateCurrent()"><div class="regen-spin"></div><span id="regen-text">Regenerate this image</span></button>
    <button class="item-lb-dl" onclick="downloadCurrentLb()">Download after</button>
  </div>
</div>
</body>
</html>
